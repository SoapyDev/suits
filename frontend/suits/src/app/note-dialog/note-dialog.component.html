<mat-dialog-content>
    <mat-form-field class="full-width full-height mb-32">
      <mat-label>Laisser un commentaire</mat-label>
      <textarea matInput [(ngModel)]="note" placeholder="Nouvelle note"></textarea>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button mat-button mat-dialog-close (click)="onNoClick()">Annuler</button>
    <button mat-button (click)="save()">Enregistrer</button>
  </mat-dialog-actions>
