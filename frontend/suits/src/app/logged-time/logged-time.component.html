<div class="l-1 p-8 mb-16 flex-row justify-between mt-16 rounded">
  <div class="flex-row gap-64">
    @if (isReadOnly()) {
      <span>{{loggedTime.name}}</span>
      <span>{{loggedTime.tarification}}$ / heure</span>
      <span>{{loggedTime.time}} heure</span>
    }@else{
      <mat-form-field>
        <mat-label>Nom</mat-label>
        <input matInput placeholder="" value="{{loggedTime.name}}"/>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Tarif</mat-label>
        <input matInput type="number" placeholder="" value="{{loggedTime.tarification}}"/>
      </mat-form-field>
      <mat-form-field>
        <mat-label>Temps</mat-label>
        <input matInput type="time" placeholder="" value="{{loggedTime.tarification}}"/>
      </mat-form-field>
    }
  </div>
