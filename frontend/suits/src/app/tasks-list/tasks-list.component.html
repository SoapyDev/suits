<div class="width-80 m-center">
  <h1>Liste des tâches à votre dossier</h1>
</div>
<div class="width-80 m-center h-screen" *ngIf="tasks">

  <table mat-table [dataSource]="dataSource" matSort class="mb-32">


    <ng-container matColumnDef="name">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Tâche</th>
      <td mat-cell *matCellDef="let task">
        <div class="flex-row justify-start align-center gap-16">
          <app-status
            [status]="task.status"
            [readonly]="true"
          />
          <span>{{task.title.substring(0,50)}}</span>
        </div>
      </td>
    </ng-container>


    <ng-container matColumnDef="case">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Dossier</th>
      <td mat-cell *matCellDef="let task">{{task.legalFileId}}</td>
    </ng-container>

    <ng-container matColumnDef="priority">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Priorité</th>
      <td mat-cell *matCellDef="let task">{{priorityToString(task.priority)}}</td>
    </ng-container>

    <ng-container matColumnDef="start">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Début</th>
      <td mat-cell *matCellDef="let task">{{formatDate(task.startDate)}}</td>
    </ng-container>

    <ng-container matColumnDef="end">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Fin</th>
      <td mat-cell *matCellDef="let task">{{formatDate(task.endDate)}}</td>
    </ng-container>

    <ng-container matColumnDef="goto">
      <th mat-header-cell mat-sort-header *matHeaderCellDef>Lien</th>
      <td mat-cell *matCellDef="let task">
        <a mat-icon-button [href]="getTaskLink(task.id)">
          <mat-icon>link</mat-icon>
        </a>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>

</div>
